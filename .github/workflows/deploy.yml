name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys; let an in-progress run finish before the next.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Builds the client (vite) and deploys the Worker + assets (wrangler),
      # the same as running `npm run deploy` locally.
      - run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
